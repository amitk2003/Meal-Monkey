name: CI

on: [push]

jobs:
  build:
    runs-on: ubuntu-latest
    env:
      JWT_SECRET_KEY: test-secret-key
    steps:
      - name: Checkout
        uses: actions/checkout@v2

      - name: Install Dependencies
        run: npm install
        working-directory: backend

      - name: Test
        run: npm run test
        working-directory: backend